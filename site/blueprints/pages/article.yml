title: Article

columns:
  main:
    width: 2/3
    fields:
      text:
        type: blocks
        fieldsets:
          - text-simple
          - picture
  sidebar:
    width: 1/3
    fields:
      published:
        label: Date de publication
        type: date
        default: now
        width: 1/2
      author:
        label: Auteur·ice
        type: users
        multiple: false
        query: kirby.users.filterBy("role", "author")
        width: 1/2
      image_cover:
        label: Image de couverture
        type: files
        layout: cards
        multiple: false
      tags:
        type: tags
        label: Tags
        options: query
        query: page.siblings.pluck("tags", ",", true)